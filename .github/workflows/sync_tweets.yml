name: Sync Tweets

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-tweets]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TARGET_ACCOUNTS: ${{ secrets.TARGET_ACCOUNTS }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      MONGO_DATABASE: ${{ secrets.MONGO_DATABASE }}
      MONGO_COLLECTIONS: ${{ secrets.MONGO_COLLECTIONS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Restore venv cache
        id: cache-venv-restore
        uses: actions/cache/restore@v5
        with:
          path: .venv
          key: ${{ runner.os }}-python-${{ steps.setup-python.outputs.python-version }}-venv-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv-restore.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Save venv cache
        if: steps.cache-venv-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .venv
          key: ${{ steps.cache-venv-restore.outputs.cache-primary-key }}

      - name: Run tweet sync
        run: .venv/bin/python scripts/sync_tweets.py
