name: Run Spiders

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-spiders]

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      MONGO_DATABASE: ${{ secrets.MONGO_DATABASE }}
      MONGO_COLLECTIONS: ${{ secrets.MONGO_COLLECTIONS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run spiders
        run: python scripts/run_spiders.py
